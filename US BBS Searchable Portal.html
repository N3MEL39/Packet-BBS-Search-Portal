<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Centering the entire application */
        body { 
            font-family: sans-serif; 
            background-color: #f4f7f6; 
            margin: 0;
            padding: 40px 20px; 
            color: #333; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .app-container {
            width: 100%;
            max-width: 900px; /* Limits width for better readability */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { margin-bottom: 25px; color: #2c3e50; }

        .search-container { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 25px; 
            width: 100%;
        }

        input { 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            flex: 1; 
            font-size: 16px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .results-info { 
            margin-bottom: 15px; 
            font-weight: bold; 
            color: #7f8c8d;
            align-self: flex-start; /* Keeps text aligned with table edge */
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        }

        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        
        th { 
            background-color: #2c3e50; 
            color: white; 
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        tr:hover { background-color: #fcfcfc; }
        
        .state-tag { 
            background: #e0e0e0; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 0.85em; 
            font-family: monospace;
            font-weight: bold;
        }

        code { 
            background: #f8f8f8; 
            padding: 3px 6px; 
            border-radius: 4px; 
            color: #c0392b;
            font-family: "Courier New", Courier, monospace;
        }

        @media (max-width: 600px) {
            .search-container { flex-direction: column; }
        }
    </style>
</head>

        let parsedRecords = [];

        function parseCSV() {
            const lines = rawCsvData.split('\n');
            lines.forEach(line => {
                if (!line.trim()) return;
                
                const parts = line.split(',');
                const call = parts[0].trim().replace(/^"|"$/g, '');
                let bbs = parts.slice(1).join(',').trim().replace(/^"|"$/g, '');
                
                if (call && bbs) {
                    let state = "US";
                    const stateMatch = bbs.match(/\.([A-Z]{2})\.USA/);
                    if (stateMatch) {
                        state = stateMatch[1];
                    } else {
                        const altMatch = bbs.match(/#([A-Z]{2,4})\.([A-Z]{2})\.USA/);
                        if (altMatch) state = altMatch[2];
                    }

                    parsedRecords.push({ 
                        call: call.toUpperCase(), 
                        bbs: bbs, 
                        state: state.toUpperCase() 
                    });
                }
            });
            filterData();
        }

        function filterData() {
            const callQuery = document.getElementById('callSearch').value.toUpperCase();
            const stateQuery = document.getElementById('stateSearch').value.toUpperCase();
            const tbody = document.getElementById('tableBody');
            
            const filtered = parsedRecords.filter(r => 
                r.call.includes(callQuery) && r.state.includes(stateQuery)
            );

            document.getElementById('countInfo').innerText = `Displaying ${filtered.length} Hubs`;
            
            tbody.innerHTML = filtered.map(r => `
                <tr>
                    <td><strong>${r.call}</strong></td>
                    <td><span class="state-tag">${r.state}</span></td>
                    <td><code>${r.bbs}</code></td>
                </tr>
            `).join('');
        }

        parseCSV();
    </script>
